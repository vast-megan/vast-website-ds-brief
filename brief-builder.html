<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vast — Brief Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Vast design tokens — from Pulse / Website Refresh design system */
  --bg:        #F9FAFB;
  --surface:   #FFFFFF;
  --surface2:  #ECE8E3;
  --surface3:  #FDFCF4;
  --border:    #DBDAD5;
  --text:      #2A2C2F;
  --muted:     #5A5754;
  --faint:     #897F75;
  --orange:    #FF5623;
  --orange-dim: rgba(255,86,35,0.08);
  --keep:      #16a34a;
  --keep-dim:  rgba(22,163,74,0.09);
  --cut:       #dc2626;
  --cut-dim:   rgba(220,38,38,0.08);
  --defer:     #2563eb;
  --defer-dim: rgba(37,99,235,0.08);
  --evolve:    #0e7490;
  --evolve-dim: rgba(14,116,144,0.08);
  --shadow-sm:   0 1px 4px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.04);
  --radius:    8px;
  --radius-sm: 4px;
  --mono: 'Phonic Mono', 'Phonic', 'Instrument Mono', monospace;
}

body {
  font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}

/* ── Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface3);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 20px;
  height: 52px;
}

.header-logo {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text);
  white-space: nowrap;
}

.header-divider {
  color: var(--border);
  font-size: 18px;
  font-weight: 200;
}

.header-sub {
  font-size: 13px;
  color: var(--muted);
  white-space: nowrap;
}

.tabs { display: flex; gap: 4px; }

.tab {
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border: 1px solid transparent;
  background: transparent;
  transition: all 0.15s;
  font-family: inherit;
}

.tab:hover { color: var(--text); background: var(--surface2); }
.tab.active { background: var(--text); color: #FFF; border-color: var(--text); }

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.progress-text {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  letter-spacing: 0.03em;
}

.progress-bar-wrap {
  width: 90px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--orange);
  border-radius: 2px;
  transition: width 0.3s ease;
}

/* ── Layout ── */
.content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 36px 48px 80px;
  width: 100%;
}
@media (max-width: 1200px) {
  .content { padding: 24px 28px 60px; }
}

.view { display: none; }
.view.active { display: block; }

/* ── Dashboard ── */
.scorecard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 32px;
}

.score-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}

.score-num {
  font-family: var(--mono);
  font-size: 34px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 6px;
}

.score-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.score-box.s-total .score-num { color: var(--text); }
.score-box.s-keep  .score-num { color: var(--keep); }
.score-box.s-cut   .score-num { color: var(--cut); }
.score-box.s-defer  .score-num { color: var(--defer); }
.score-box.s-evolve .score-num { color: var(--evolve); }

.section-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.dash-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.dash-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.12s;
  box-shadow: var(--shadow-sm);
}

.dash-row:hover { background: var(--surface2); }
.dash-row.d-keep   { border-left-color: var(--keep); }
.dash-row.d-cut    { border-left-color: var(--cut); }
.dash-row.d-defer  { border-left-color: var(--defer); }
.dash-row.d-evolve { border-left-color: var(--evolve); }

.badge {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
  min-width: 76px;
  text-align: center;
}

.badge.d-keep      { background: var(--keep-dim);   color: var(--keep); }
.badge.d-cut       { background: var(--cut-dim);    color: var(--cut); }
.badge.d-defer     { background: var(--defer-dim);  color: var(--defer); }
.badge.d-evolve    { background: var(--evolve-dim); color: var(--evolve); }
.badge.d-undecided { background: var(--surface2);   color: var(--muted); }

.dash-name { font-size: 13px; flex: 1; color: var(--text); }
.dash-num  { font-family: var(--mono); font-size: 11px; color: var(--faint); }

/* ── Decisions ── */
.filter-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  transition: all 0.15s;
  font-family: inherit;
}

.filter-btn:hover { background: var(--surface2); color: var(--text); }
.filter-btn.active { background: var(--text); color: #FFF; border-color: var(--text); }

/* Applied to list-mode card containers everywhere */
.cards-list, #cards-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.section-divider {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 18px 0 6px;
  border-top: 1px solid var(--border);
  margin-top: 6px;
}

.section-divider:first-child { border-top: none; padding-top: 0; }

/* ── Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.card-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 15px 18px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
}

.card-top:hover { background: var(--bg); }

.card-num {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--faint);
  flex-shrink: 0;
  padding-top: 3px;
  min-width: 20px;
  letter-spacing: 0.04em;
}

.card-info { flex: 1; min-width: 0; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; color: var(--text); }
.card-desc  { font-size: 13px; color: var(--muted); line-height: 1.4; }

.card-chevron {
  flex-shrink: 0;
  color: var(--faint);
  font-size: 9px;
  transition: transform 0.2s;
  margin-top: 5px;
}

.card.open .card-chevron { transform: rotate(90deg); }

.card-body {
  display: none;
  padding: 0 18px 18px;
  border-top: 1px solid var(--border);
}

.card.open .card-body { display: block; }

.hint-box {
  margin: 14px 0 10px;
  padding: 9px 12px;
  background: var(--orange-dim);
  border-left: 3px solid var(--orange);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 12px;
  color: var(--text);
  line-height: 1.5;
}

.node-tag {
  display: inline-block;
  margin-top: 5px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  background: var(--surface2);
  padding: 2px 7px;
  border-radius: var(--radius-sm);
  letter-spacing: 0.04em;
}

.comments-list {
  margin: 12px 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.comment {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}

.comment-who {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.comment-text {
  font-size: 13px;
  color: var(--text);
  font-style: italic;
  line-height: 1.5;
}

.dec-row {
  display: flex;
  gap: 6px;
  margin: 14px 0 12px;
}

.dec-btn {
  flex: 1;
  padding: 8px 6px;
  border-radius: var(--radius-sm);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  transition: all 0.15s;
}

.dec-btn:hover { color: var(--text); background: var(--border); }

.dec-btn.sel-keep   { background: var(--keep-dim);   color: var(--keep);   border-color: var(--keep); }
.dec-btn.sel-cut    { background: var(--cut-dim);    color: var(--cut);    border-color: var(--cut); }
.dec-btn.sel-defer  { background: var(--defer-dim);  color: var(--defer);  border-color: var(--defer); }
.dec-btn.sel-evolve { background: var(--evolve-dim); color: var(--evolve); border-color: var(--evolve); }

.notes-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.notes-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 13px;
  padding: 9px 12px;
  resize: vertical;
  min-height: 60px;
  outline: none;
  transition: border-color 0.15s;
}

.notes-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px var(--orange-dim); }
.notes-input::placeholder { color: var(--faint); }

/* ── Brief ── */
.brief-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.copy-btn {
  padding: 7px 18px;
  background: var(--orange);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}

.copy-btn:hover { opacity: 0.85; }
.copy-btn.copied { background: var(--keep); }

.brief-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.8;
  white-space: pre-wrap;
  color: var(--text);
  min-height: 440px;
  box-shadow: var(--shadow-sm);
}

.brief-placeholder {
  font-style: italic;
  color: var(--muted);
  font-family: 'Instrument Sans', sans-serif;
}

/* ── View toggle ── */
.view-toggle {
  display: flex;
  gap: 2px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 3px;
}

.vtoggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 26px;
  border: none;
  background: transparent;
  border-radius: 3px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.12s;
}

.vtoggle:hover { color: var(--text); }
.vtoggle.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }

/* ── Dash grid ── */
.dash-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.grid-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: background 0.12s, border-top-color 0.15s;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 90px;
}

.grid-card:hover { background: var(--bg); }
.grid-card.d-keep   { border-top-color: var(--keep); }
.grid-card.d-cut    { border-top-color: var(--cut); }
.grid-card.d-defer  { border-top-color: var(--defer); }
.grid-card.d-evolve { border-top-color: var(--evolve); }

.grid-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.grid-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--faint);
  letter-spacing: 0.04em;
}

.grid-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
  flex: 1;
}

/* ── Key ── */
.key {
  display: flex;
  flex-direction: column;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-sm);
}

.key-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--muted);
}

.key-item strong { color: var(--text); }

.key-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Sync buttons ── */
.sync-btns {
  display: flex;
  gap: 2px;
  margin-right: 6px;
}

.sync-btn {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--muted);
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 3px 8px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}

.sync-btn:hover { color: var(--text); border-color: var(--text); }

/* ── Components tab ── */
.comp-subtabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
}
.comp-subtab {
  padding: 5px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: all 0.15s;
  font-family: inherit;
}
.comp-subtab:hover { color: var(--text); background: var(--surface2); }
.comp-subtab.active { background: var(--text); color: #FFF; border-color: var(--text); }
.comp-view { display: none; }
.comp-view.active { display: block; }

/* Component progress bar */
.comp-progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.comp-prog-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.04em;
  min-width: 100px;
}
.comp-prog-track {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.comp-prog-fill {
  height: 100%;
  background: var(--keep);
  border-radius: 2px;
  transition: width 0.4s;
}
.comp-prog-pct {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--text);
  min-width: 32px;
  text-align: right;
}

/* Component card */
.comp-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 8px;
  box-shadow: var(--shadow-sm);
}
.comp-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  cursor: pointer;
  transition: background 0.12s;
  user-select: none;
}
.comp-card-header:hover { background: var(--bg); }
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: background 0.2s;
}
.status-todo     { background: var(--border); }
.status-progress { background: #f59e0b; }
.status-done     { background: var(--keep); }
.comp-card-name {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
  color: var(--text);
}
.comp-badge {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
}
.comp-todo     { background: var(--surface2); color: var(--muted); }
.comp-progress { background: rgba(245,158,11,0.1); color: #b45309; }
.comp-done     { background: var(--keep-dim); color: var(--keep); }
.comp-chevron {
  color: var(--faint);
  font-size: 9px;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.comp-card.open .comp-chevron { transform: rotate(90deg); }
.comp-card-body {
  padding: 0 16px 16px;
  border-top: 1px solid var(--border);
}
.comp-card-body.hidden { display: none; }

/* Variants */
.variants-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px 0 10px;
}
.variant-controls {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.variant-btn {
  width: 22px;
  height: 22px;
  border: 1px solid var(--border);
  background: var(--surface2);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  color: var(--text);
  transition: background 0.12s;
  font-family: inherit;
}
.variant-btn:hover { background: var(--border); }
.variant-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin-bottom: 6px;
}
.variant-name-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 7px;
}
.variant-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--faint);
  min-width: 14px;
  letter-spacing: 0.04em;
}
.variant-name-input {
  flex: 1;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: 'Instrument Sans', sans-serif;
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.variant-name-input:focus { border-color: var(--orange); }

/* Types chips */
.type-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin: 8px 0 14px;
}
.type-chip {
  font-size: 11px;
  padding: 3px 9px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--muted);
  font-family: var(--mono);
  letter-spacing: 0.02em;
}

/* Card actions */
.comp-card-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 14px;
  gap: 8px;
}
.comp-mark-btn {
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: var(--text);
  color: #fff;
  transition: opacity 0.15s;
}
.comp-mark-btn:hover { opacity: 0.8; }
.comp-unmark-btn {
  background: var(--surface2);
  color: var(--muted);

const KEY = 'vast-brief-v1';

function load() {
  try { return JSON.parse(localStorage.getItem(KEY) || '{}'); }
  catch { return {}; }
}

function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

let state = load();          // { [id]: { decision, notes } }
const openAuditCards    = new Set(); // session-only, never persisted — cards always start closed
const openDecisionCards = new Set(); // same for Decisions list view
let activeFilter = 'all';
let activeTab = 'dashboard';
let dashView = 'list';
// Grid/list modes — default to list
const viewModes = { audit: 'list', decisions: 'list', blockers: 'list' };
// Filter states
let blockersFilter  = 'all';  // all | strategic | deferred-audit | deferred-comp
let decisionsFilter = 'all';  // all | components | audit

// Blockers — strategic open decisions
const BLOCKERS = [
  'Type ramp — Which 5 styles are the final set?',
  'Deep dive model — Stripe (expand in place) or Apple (drill down to a new view)?',
  'Video autoplay — Yes or no? Affects the video block and tab panel.',
  'Accordion vs tabs — For specs and technical content?',
  'Footer structure — Which of the 4 current variants wins?',
  'Center alignment — Blanket rule or decided case-by-case?',
  'Copy density — 150 characters confirmed for descriptions? Any exceptions?',
  'Icon style — Line weight, outline vs filled? Must be defined before the icon set is built.',
  'Breakpoints — Mobile and tablet behavior — nothing defined yet.',
  'Dark mode — Full dark mode or surface variants (dark sections) only?'
];
// Helpers to split "Title — description" strings
function bTitle(q) { return q.split(' — ')[0]; }
function bDesc(q)  { const p = q.split(' — '); return p.length > 1 ? p.slice(1).join(' — ') : ''; }
const BLOCKER_KEY = 'vast-blockers-v1';
function loadBlockers() { try { return JSON.parse(localStorage.getItem(BLOCKER_KEY) || '[]'); } catch { return []; } }
let blockerState = loadBlockers(); // [{ answer: '', resolved: false }, ...]
// Ensure blocker state has an entry per blocker
while (blockerState.length < BLOCKERS.length) blockerState.push({ answer: '', resolved: false });
function saveBlockers() { localStorage.setItem(BLOCKER_KEY, JSON.stringify(blockerState)); }

// ─────────────────────────────────────────────
// STATS
// ─────────────────────────────────────────────
function stats() {
  let keep = 0, cut = 0, defer = 0;
  ITEMS.forEach(i => {
    const d = state[i.id]?.decision;
    if (d === 'keep')  keep++;
    else if (d === 'cut')   cut++;
    else if (d === 'defer') defer++;
  });
  return { keep, cut, defer, total: keep + cut + defer };
}

// ─────────────────────────────────────────────
// GLOBAL REFRESH
// ─────────────────────────────────────────────
function refresh() {
  const s = stats();
  const pct = Math.round((s.total / 22) * 100);
  // Header progress bar removed — update audit tab bar instead
  const auditFill  = document.getElementById('audit-prog-fill');
  const auditLabel = document.getElementById('audit-prog-label');
  const auditPct   = document.getElementById('audit-prog-pct');
  if (auditFill)  auditFill.style.width = pct + '%';
  if (auditLabel) auditLabel.textContent = s.total + ' of 22 decided';
  if (auditPct)   auditPct.textContent   = pct + '%';
  // Also keep old IDs working if they exist elsewhere
  const pfill = document.getElementById('prog-fill');
  const ptext = document.getElementById('prog-text');
  if (pfill) pfill.style.width = pct + '%';
  if (ptext) ptext.textContent = s.total + ' of 22 decided';
  document.getElementById('sc-total').textContent = s.total;
  document.getElementById('sc-keep').textContent = s.keep;
  document.getElementById('sc-cut').textContent = s.cut;
  document.getElementById('sc-defer').textContent = s.defer;
  renderNewDashboard();
  if (activeTab === 'audit')      { renderAuditDash(); renderCards(); }
  if (activeTab === 'decisions')  renderDecisionsSummary();
  if (activeTab === 'blockers')   renderBlockers();
  if (activeTab === 'brief')      renderBrief();
}

function renderCards() {
  const el = document.getElementById('cards-list');
  if (!el) return;
  const mode = viewModes.audit;

  const visible = ITEMS.filter(i => {
    if (activeFilter === 'all') return true;
    const d = state[i.id]?.decision || 'undecided';
    return d === activeFilter;
  });

  if (!visible.length) {
    el.innerHTML = `<div class="empty">No items match this filter.</div>`;
    return;
  }

  if (mode === 'grid') {
    const modules = visible.filter(i => i.type === 'module');
    const rules   = visible.filter(i => i.type === 'rule');
    let html = '';
    const auditTile = item => {
      const d = state[item.id]?.decision || 'undecided';
      return `<div class="comp-grid-tile" onclick="openAuditModal(${item.id})">
        <span class="status-label sl-${d}">${{keep:'Keep / Evolve',cut:'Cut',defer:'Deferred',undecided:'Not Started'}[d]}</span>
        <div class="comp-grid-name">${escH(item.title)}</div>
        <div class="comp-grid-desc">${escH(item.desc)}</div>
        <div class="comp-grid-cat">Item #${item.id}</div>
      </div>`;
    };
    if (modules.length) {
      html += `<div class="section-divider">Specific Modules — Items 1–17</div>
        <div class="comp-grid-wrap">${modules.map(auditTile).join('')}</div>`;
    }
    if (rules.length) {
      html += `<div class="section-divider" style="margin-top:16px">General Rules — Items 18–22</div>
        <div class="comp-grid-wrap">${rules.map(auditTile).join('')}</div>`;
    }
    el.innerHTML = html;
  } else {
    const modules = visible.filter(i => i.type === 'module');
    const rules   = visible.filter(i => i.type === 'rule');
    let html = '';
    if (modules.length) html += `<div class="section-divider">Specific Modules — Items 1–17</div>` + modules.map(card).join('');
    if (rules.length)   html += `<div class="section-divider">General Rules — Items 18–22</div>` + rules.map(card).join('');
    el.innerHTML = html;
  }
}

function renderBrief() {
  const el = document.getElementById('brief-box');
  const s = stats();

  if (s.total === 0) {
    el.innerHTML = '<span class="brief-placeholder">Make decisions in the Decisions tab — the brief will auto-generate here as you go.\n\nYou can copy this text and paste it directly into an email or document to send to Antinomy.</span>';
    return;
  }

  const keeps    = ITEMS.filter(i => state[i.id]?.decision === 'keep');
  const cuts     = ITEMS.filter(i => state[i.id]?.decision === 'cut');
  const defers   = ITEMS.filter(i => state[i.id]?.decision === 'defer');
  const undecided = ITEMS.filter(i => !state[i.id]?.decision);

  const today = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  const line  = '─'.repeat(52);

  const cutEst = cuts.length > 0
    ? ` (~${Math.round((cuts.length / 22) * 25)}–${Math.round((cuts.length / 22) * 35)}% scope reduction)`
    : '';

  let t = '';
  t += `ANTINOMY BRIEF — VAST 2026 WEBSITE REFRESH\n`;
  t += `${line}\n`;
  t += `Date: ${today}\n`;
  t += `Prepared by: Vast Internal Team\n`;
  t += `Status: Re-engaging Antinomy after internal alignment\n\n`;

  t += `DECISION SUMMARY\n`;
  t += `${line}\n`;
  t += `  Keep / Evolve  ${s.keep} items\n`;
  t += `  Cut      ${cuts.length} items${cutEst}\n`;
  t += `  Deferred ${defers.length} items (post-launch)\n`;
  if (undecided.length > 0) {
  t += `  TBD      ${undecided.length} items still need a decision\n`;
  }
  t += `\n`;

  if (keeps.length > 0) {
    t += `${line}\n`;
    t += `KEEP / EVOLVE — Modules & Rules in Scope\n`;
    t += `${line}\n\n`;
    keeps.forEach(item => {
      t += `• ${item.title}`;
      if (item.node) t += ` [node ${item.node}]`;
      t += `\n`;
      const notes = state[item.id]?.notes?.trim();
      if (notes) t += `  Notes: ${notes}\n`;
      t += `\n`;
    });
  }


  if (cuts.length > 0) {
    t += `${line}\n`;
    t += `CUT — Remove from Scope Entirely\n`;
    t += `${line}\n\n`;
    cuts.forEach(item => {
      t += `• ${item.title}`;
      if (item.node) t += ` [node ${item.node}]`;
      t += `\n`;
      const notes = state[item.id]?.notes?.trim();
      if (notes) t += `  Reason: ${notes}\n`;
      t += `\n`;
    });
  }

  if (defers.length > 0) {
    t += `${line}\n`;
    t += `DEFER — Post-Launch Enhancements\n`;
    t += `${line}\n\n`;
    defers.forEach(item => {
      t += `• ${item.title}`;
      if (item.node) t += ` [node ${item.node}]`;
      t += `\n`;
      const notes = state[item.id]?.notes?.trim();
      if (notes) t += `  Notes: ${notes}\n`;
      t += `\n`;
    });
  }

  // Gather any rules that were decided
  const ruleLines = [];

  const typo = state[17];
  if (typo?.decision) {
    ruleLines.push(`Typography`);
    ruleLines.push(`  • 5 font styles maximum (currently ~10)`);
    ruleLines.push(`  • Brand fonts only: Owner's, Phonic — no Inter`);
    ruleLines.push(`  • Pattern: Large headline + body copy in supporting role`);
    if (typo.notes?.trim()) ruleLines.push(`  • ${typo.notes.trim()}`);
    ruleLines.push('');
  }

  const copy = state[21];
  if (copy?.decision) {
    ruleLines.push(`Copy Density`);
    ruleLines.push(`  • Descriptions: 150 characters max`);
    ruleLines.push(`  • Headline rule: Long headline only OR Short headline + paragraph — never both`);
    if (copy.notes?.trim()) ruleLines.push(`  • ${copy.notes.trim()}`);
    ruleLines.push('');
  }

  const deepDive = state[18];
  if (deepDive?.decision) {
    ruleLines.push(`Deep Dive Interaction Model`);
    if (deepDive.notes?.trim()) {
      ruleLines.push(`  • ${deepDive.notes.trim()}`);
    } else {
      ruleLines.push(`  • Decision: [add your choice — Stripe model, Apple model, or Hybrid]`);
    }
    ruleLines.push('');
  }

  const cards = state[20];
  if (cards?.decision) {
    ruleLines.push(`Card Component System`);
    ruleLines.push(`  • Remove: Payload card components (confirmed obsolete)`);
    if (cards.notes?.trim()) ruleLines.push(`  • ${cards.notes.trim()}`);
    ruleLines.push('');
  }

  const infographic = state[19];
  if (infographic?.decision) {
    ruleLines.push(`Infographic Style`);
    ruleLines.push(`  • Light, line-drawing style infographics only`);
    ruleLines.push(`  • Old heavy infographic style is being removed from site`);
    if (infographic.notes?.trim()) ruleLines.push(`  • ${infographic.notes.trim()}`);
    ruleLines.push('');
  }

  const depth = state[22];
  if (depth?.decision) {
    ruleLines.push(`Design Principle: Technical-yet-Human`);
    ruleLines.push(`  • Simplify where possible — but do not over-simplify`);
    ruleLines.push(`  • The site is top-of-funnel but must maintain technical credibility`);
    if (depth.notes?.trim()) ruleLines.push(`  • ${depth.notes.trim()}`);
    ruleLines.push('');
  }

  if (ruleLines.length > 0) {
    t += `${line}\n`;
    t += `NEW RULES FOR ANTINOMY TO FOLLOW\n`;
    t += `${line}\n\n`;
    t += ruleLines.join('\n') + '\n';
  }

  if (undecided.length > 0) {
    t += `${line}\n`;
    t += `STILL NEEDS DECISION (${undecided.length} items)\n`;
    t += `${line}\n\n`;
    undecided.forEach(item => {
      t += `• ${item.title}\n`;
    });
    t += `\n`;
  }

  t += `${line}\n`;
  t += `NEXT STEPS\n`;
  t += `${line}\n\n`;
  t += `1. Antinomy to acknowledge this brief and confirm they can proceed\n`;
  t += `2. Unblock the "paused until further alignment" status (paused May 26, 2026)\n`;
  t += `3. Lock foundational systems first: typography → color → spacing → components\n`;
  t += `4. Get updated timeline and estimate based on reduced scope\n`;
  t += `5. Max 2 design rounds per module — then decide or cut\n\n`;
  t += `${line}\n`;
  t += `Figma File: Dhpi5a7jp2NUKId3J3YvNq  (2026 Website Refresh)\n`;

  el.textContent = t;
}

function decide(id, decision) {
  if (!state[id]) state[id] = {};
  // Toggle off if tapping the same button again
  state[id].decision = (state[id].decision === decision) ? null : decision;
  openAuditCards.add(id); // keep card open after deciding, but session-only
  save();
  refresh();
  setTimeout(() => {
    const card = document.getElementById('card-' + id);
    if (card) {
      card.classList.add('open');
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }, 10);
}

function setNotes(id, value) {
  if (!state[id]) state[id] = {};
  state[id].notes = value;
  save();
  if (activeTab === 'brief') renderBrief();
}

function jumpTo(id) {

  activeTab = 'audit';
  activeFilter = 'all';

  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));

function copyBrief() {
  const text = document.getElementById('brief-box').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {

      btn.classList.remove('copied');
    }, 2000);
  });
}

function exportNotes() {
  const name = prompt('Your name (so the other person knows whose notes these are):', 'Megan');
  if (!name) return;
  const date = new Date().toISOString().slice(0, 10);
  const slug = name.toLowerCase().replace(/\s+/g, '-');
  const filename = `vast-website-ds-brief-notes-${slug}-${date}`;
  const payload = { author: name, exported: new Date().toISOString(), state };
  const json = JSON.stringify(payload, null, 2);
  const zip = new JSZip();
  zip.file(`${filename}.json`, json);
  zip.generateAsync({ type: 'blob' }).then(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${filename}.zip`;
    a.click();
  });
}

function importNotes(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const payload = JSON.parse(e.target.result);
      if (!payload.state) throw new Error('Invalid file');
      const author = payload.author || 'Someone';
      const count = Object.keys(payload.state).length;
      if (!confirm(`Import ${count} notes from ${author}?\n\nTheir decisions and notes will be merged into yours. If you both left notes on the same item, both are kept.`)) return;
      Object.entries(payload.state).forEach(([id, data]) => {
        if (!state[id]) state[id] = {};
        if (!state[id].decision && data.decision) state[id].decision = data.decision;
        if (data.notes && !state[id].notes) state[id].notes = data.notes;
        else if (data.notes && state[id].notes && data.notes !== state[id].notes) {
          state[id].notes = state[id].notes + '\n\n' + author + ': ' + data.notes;
        }
      });
      save();
      refresh();
      if (activeTab === 'decisions') renderCards();
      alert(`Imported notes from ${author}.`);
    } catch {
      alert('Could not read that file — make sure it\'s a notes file exported from this tool.');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function renderBlockers() {
  const el = document.getElementById('blockers-content');
  if (!el) return;
  const mode = viewModes.blockers;
  const toggle = viewToggleHtml('blockers');
  const resolved = blockerState.filter(b => b.resolved).length;

  // Section A: Strategic open decisions — standard comp-card / comp-grid-tile pattern
  const strategicHtml = BLOCKERS.map((q, i) => {
    const b = blockerState[i];
    const s = b.resolved ? 'done' : (b.answer.trim() ? 'progress' : 'todo');
    if (mode === 'grid') {
      return `
        <div class="comp-grid-tile" onclick="openBlockerModal(${i})">
          <span class="status-label sl-${s}">${statusLabel(s)}</span>
          <div class="comp-grid-name">${escH(bTitle(q))}</div>
          <div class="comp-grid-desc">${escH(bDesc(q))}</div>
          <div class="comp-grid-cat">Item #${i + 1}</div>
        </div>`;
    }
    const isOpen    = openBlockerCards.has(i);
    const isEditing = editingCards.has('blk-' + i);
    const ro        = b.resolved && !isEditing;
    const bodyHtml  = ro
      ? `${b.answer ? `<div class="notes-label" style="margin-top:12px">Decision / Answer</div><p class="ro-text">${escH(b.answer)}</p>` : '<span class="ro-empty" style="display:block;margin-top:12px">No answer recorded.</span>'}
         <div class="comp-card-actions" style="margin-top:12px">
           <button class="comp-unmark-btn" onclick="toggleBlockerFromCard(${i})">Mark unresolved</button>
           <button class="comp-mark-btn" onclick="toggleBlockerEditMode(${i})">Edit</button>
         </div>`
      : `<div class="notes-label" style="margin-top:12px">Decision / Answer</div>
         <textarea class="notes-input" placeholder="Write your decision here…"
           oninput="updateBlockerAnswer(${i}, this.value)">${escH(b.answer)}</textarea>
         <div class="comp-card-actions">
           ${b.resolved
             ? `<button class="comp-unmark-btn" onclick="toggleBlockerFromCard(${i})">Mark unresolved</button>
                <button class="comp-mark-btn" onclick="toggleBlockerEditMode(${i})">Done editing</button>`
             : `<button class="comp-mark-btn" onclick="toggleBlockerFromCard(${i})">Mark resolved</button>`}
         </div>`;
    return `
      <div class="comp-card ${isOpen ? 'open' : ''}" id="blk-card-${i}">
        <div class="comp-card-header" onclick="toggleBlockerCard(${i})">
          <span class="status-label sl-${s}">${statusLabel(s)}</span>
          <div style="flex:1;min-width:0">
            <div class="card-title">${escH(bTitle(q))}</div>
            ${bDesc(q) ? `<div class="card-desc">${escH(bDesc(q))}</div>` : ''}
          </div>
          <span class="comp-chevron">▶</span>
        </div>
        <div class="comp-card-body ${isOpen ? '' : 'hidden'}">${bodyHtml}</div>
      </div>`;
  }).join('');

  // Section B: Deferred audit items
  const deferredAudit = ITEMS.filter(i => state[i.id]?.decision === 'defer');
  const deferredAuditHtml = deferredAudit.length === 0
    ? '<div class="empty" style="padding:12px 0;font-size:13px">No deferred audit items.</div>'
    : mode === 'grid'
      ? `<div class="comp-grid-wrap">${deferredAudit.map(item => `
          <div class="comp-grid-tile" onclick="openAuditModal(${item.id})">
            <span class="status-label sl-defer">Deferred</span>
            <div class="comp-grid-name">${escH(item.title)}</div>
            <div class="comp-grid-cat">Item #${item.id}</div>
          </div>`).join('')}</div>`
      : `<div class="cards-list">${deferredAudit.map(item => card(item)).join('')}</div>`;

  // Section C: Deferred component items
  const deferredCompHtmlParts = [];
  if (typeof ORGANISMS_DATA !== 'undefined') {
    ORGANISMS_DATA.forEach(o => { if (compState.organisms?.[o.id]?.status === 'deferred') deferredCompHtmlParts.push({name: o.name, cat: o.cat, id: o.id, type: 'org', label: 'Organism'}); });
    MOLECULES_DATA.forEach(m => { if (compState.molecules?.[m.id]?.status === 'deferred') deferredCompHtmlParts.push({name: m.name, cat: m.cat, id: m.id, type: 'mol', label: 'Molecule'}); });
    ATOMS_DATA.forEach(a => { if (compState.atoms?.[a.id]?.status === 'deferred') deferredCompHtmlParts.push({name: a.name, cat: a.cat, id: a.id, type: 'atom', label: 'Atom'}); });
    (compState.custom?.organisms || []).forEach(c => { if (c.status === 'deferred') deferredCompHtmlParts.push({name: c.name, cat: c.cat, id: c.id, type: 'custom-org', label: 'Custom'}); });
    (compState.custom?.molecules || []).forEach(c => { if (c.status === 'deferred') deferredCompHtmlParts.push({name: c.name, cat: c.cat, id: c.id, type: 'custom-mol', label: 'Custom'}); });
  }
  const deferredCompHtml = deferredCompHtmlParts.length === 0
    ? '<div class="empty" style="padding:12px 0;font-size:13px">No deferred components.</div>'
    : mode === 'grid'
      ? `<div class="comp-grid-wrap">${deferredCompHtmlParts.map(c => `
          <div class="comp-grid-tile deferred" onclick="openGridModal('${c.type}','${c.id}')">
            <span class="status-label sl-deferred">Deferred</span>
            <div class="comp-grid-name">${escH(c.name)}</div>
            <div class="comp-grid-cat">${escH(c.label)} · ${escH(c.cat)}</div>
          </div>`).join('')}</div>`
      : deferredCompHtmlParts.map(c => renderDeferredCompCard(c.type, c.id, c.name, c.cat, c.label)).join('');

  const blkFilterBar = `<div class="filter-bar" style="margin-bottom:0">
    <button class="filter-btn ${blockersFilter==='all'?'active':''}" onclick="setBlockersFilter('all',this)">All</button>
    <button class="filter-btn ${blockersFilter==='strategic'?'active':''}" onclick="setBlockersFilter('strategic',this)">Strategic (${BLOCKERS.length})</button>
    <button class="filter-btn ${blockersFilter==='deferred-audit'?'active':''}" onclick="setBlockersFilter('deferred-audit',this)">Deferred Audit (${deferredAudit.length})</button>
    <button class="filter-btn ${blockersFilter==='deferred-comp'?'active':''}" onclick="setBlockersFilter('deferred-comp',this)">Deferred Components (${deferredCompHtmlParts.length})</button>
  </div>`;

  const blkPct = Math.round(resolved/BLOCKERS.length*100);

  el.innerHTML = `
    <div class="comp-progress-row" style="margin-bottom:14px">
      <span class="comp-prog-label">${resolved} of ${BLOCKERS.length} strategic decisions resolved</span>
      <div class="comp-prog-track"><div class="comp-prog-fill" style="width:${blkPct}%"></div></div>
      <span class="comp-prog-pct">${blkPct}%</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px">
      ${blkFilterBar}
      ${toggle}
    </div>
    <div class="section-label" style="margin-bottom:10px">Strategic Open Decisions (${BLOCKERS.length})</div>
    ${(blockersFilter === 'all' || blockersFilter === 'strategic') ? (mode === 'grid' ? `<div class="comp-grid-wrap">${strategicHtml}</div>` : strategicHtml) : ''}
    ${(blockersFilter === 'all' || blockersFilter === 'deferred-audit') ? `<div class="section-label" style="margin:${blockersFilter==='all'?'28px':'0'} 0 10px">Deferred Audit Items (${deferredAudit.length})</div>${deferredAuditHtml}` : ''}
    ${(blockersFilter === 'all' || blockersFilter === 'deferred-comp') ? `<div class="section-label" style="margin:${blockersFilter==='all'?'28px':'0'} 0 10px">Deferred Components (${deferredCompHtmlParts.length})</div>${deferredCompHtml}` : ''}
  `;
}

  if (openCompDecCards.has(id)) openCompDecCards.delete(id);
  else openCompDecCards.add(id);
  const card = document.getElementById('cdc-' + id);
  const body = card?.querySelector('.comp-card-body');
  if (card) card.classList.toggle('open', openCompDecCards.has(id));
  if (body) body.classList.toggle('hidden', !openCompDecCards.has(id));
}

function toggleDeferredCard(id) {
  if (openDeferredCards.has(id)) openDeferredCards.delete(id);
  else openDeferredCards.add(id);
  const card = document.getElementById('deferred-' + id);
  const body = card?.querySelector('.comp-card-body');
  if (card) card.classList.toggle('open', openDeferredCards.has(id));
  if (body) body.classList.toggle('hidden', !openDeferredCards.has(id));
}

function updateBlockerAnswer(index, value) {
  blockerState[index].answer = value;
  if (!blockerState[index].resolved && value.trim()) {
    const sl = document.querySelector(`#blk-card-${index} .status-label`);
    if (sl) { sl.className = 'status-label sl-progress'; sl.textContent = 'In progress'; }
  }
  saveBlockers();
}

function setBlockersFilter(filter) {
  blockersFilter = filter;
  const y = window.scrollY;
  renderBlockers();
  window.scrollTo(0, y);
}

function setDecisionsFilter(filter) {
  decisionsFilter = filter;
  const y = window.scrollY;
  renderDecisionsSummary();
  window.scrollTo(0, y);
}

function toggleBlockerResolved(index) {
  blockerState[index].resolved = !blockerState[index].resolved;
  saveBlockers();
  const y = window.scrollY;
  renderBlockers();
  renderNewDashboard();
  window.scrollTo(0, y);
}

function toggleBlockerCard(index) {
  if (openBlockerCards.has(index)) openBlockerCards.delete(index);
  else openBlockerCards.add(index);
  const card = document.getElementById('blk-card-' + index);
  const body = card?.querySelector('.comp-card-body');
  if (card) card.classList.toggle('open', openBlockerCards.has(index));
  if (body) body.classList.toggle('hidden', !openBlockerCards.has(index));
}

function toggleBlockerFromCard(index) {
  blockerState[index].resolved = !blockerState[index].resolved;
  saveBlockers();
  const y = window.scrollY;
  renderBlockers();
  renderNewDashboard();
  if (activeTab === 'decisions') renderDecisionsSummary();
  window.scrollTo(0, y);
}

function openBlockerModal(index) {
  const b         = blockerState[index];
  const q         = BLOCKERS[index];
  const modal     = document.getElementById('comp-modal');
  const content   = document.getElementById('comp-modal-content');
  if (!modal || !content) return;

  const s         = b.resolved ? 'done' : (b.answer.trim() ? 'progress' : 'todo');
  const isEditing = editingCards.has('blk-' + index);
  const ro        = b.resolved && !isEditing;

  const modalBody = ro
    ? `${b.answer ? `<div class="notes-label">Decision / Answer</div><p class="ro-text">${escH(b.answer)}</p>` : '<span class="ro-empty" style="display:block;margin-bottom:10px">No answer recorded.</span>'}
       <div class="comp-card-actions" style="margin-top:16px">
         <button class="comp-unmark-btn" onclick="toggleBlockerFromModal(${index})">Mark unresolved</button>
         <button class="comp-mark-btn" onclick="toggleBlockerEditModeModal(${index})">Edit</button>
       </div>`
    : `<div class="notes-label">Decision / Answer</div>
       <textarea class="notes-input" style="min-height:100px" placeholder="Write your decision here…"
         oninput="updateBlockerAnswerModal(${index}, this.value)">${escH(b.answer)}</textarea>
       <div class="comp-card-actions" style="margin-top:16px">
         ${b.resolved
           ? `<button class="comp-unmark-btn" onclick="toggleBlockerFromModal(${index})">Mark unresolved</button>
              <button class="comp-mark-btn" onclick="toggleBlockerEditModeModal(${index})">Done editing</button>`
           : `<button class="comp-mark-btn" onclick="toggleBlockerFromModal(${index})">Mark resolved</button>`}
       </div>`;

  content.innerHTML = `
    <div style="margin-bottom:20px">
      <span class="status-label sl-${s}" style="margin-bottom:10px;display:inline-block">${statusLabel(s)}</span>
      <div style="font-size:17px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:6px">${escH(bTitle(q))}</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:4px">${escH(bDesc(q))}</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:0.06em">Item #${index + 1} of ${BLOCKERS.length}</div>
    </div>
    ${modalBody}`;

  modal.style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function updateBlockerAnswerModal(index, value) {
  blockerState[index].answer = value;
  saveBlockers();
}

function toggleBlockerFromModal(index) {
  blockerState[index].resolved = !blockerState[index].resolved;
  saveBlockers();
  openBlockerModal(index);  // refresh modal state
  renderBlockers();
  renderNewDashboard();
  if (activeTab === 'decisions') renderDecisionsSummary();
}

// ─────────────────────────────────────────────
// DECISIONS SUMMARY — read-only
// ─────────────────────────────────────────────
function renderDecisionsSummary() {
  const el = document.getElementById('decisions-content');
  if (!el) return;
  const mode = viewModes.decisions;
  const toggle = viewToggleHtml('decisions');

  // Components ready
  const orgDone  = typeof ORGANISMS_DATA !== 'undefined' ? ORGANISMS_DATA.filter(o => compState.organisms?.[o.id]?.status === 'done') : [];
  const molDone  = typeof MOLECULES_DATA !== 'undefined' ? MOLECULES_DATA.filter(m => compState.molecules?.[m.id]?.status === 'done') : [];
  const atmDone  = typeof ATOMS_DATA !== 'undefined' ? ATOMS_DATA.filter(a => compState.atoms?.[a.id]?.status === 'done') : [];
  const compTotal = orgDone.length + molDone.length + atmDone.length;
  const grandTotal = (ORGANISMS_DATA?.length || 0) + (MOLECULES_DATA?.length || 0) + (ATOMS_DATA?.length || 0);

  const allCompDone = [...orgDone, ...molDone, ...atmDone];

  const tiers = ['org', 'mol', 'atom'];

  const compTile = (i, tier) => `
    <div class="comp-grid-tile" onclick="openGridModal('${tier}','${i.id}')">
      <span class="status-label sl-done">Ready</span>
      <div class="comp-grid-name">${escH(i.name)}</div>
      <div class="comp-grid-cat">${escH(i.cat)}</div>
    </div>`;

  const compRow = (i, tier) => {
    const data = tier === 'org' ? getOrgData(i.id) : tier === 'mol' ? getMolData(i.id) : getAtomData(i.id);
    const isOpen = openCompDecCards.has(i.id);
    const typesHtml = data.types
      ? `<div class="notes-label" style="margin-top:14px">Types / States</div><div class="type-chips">${data.types.map(t => `<span class="type-chip">${escH(t)}</span>`).join('')}</div>`
      : '';
    const variantsHtml = data.variants
      ? `<div class="notes-label" style="margin-top:14px">Variants</div>${data.variants.map(v => `<div style="padding:7px 0;font-size:13px;color:var(--text);border-bottom:1px solid var(--border)">${escH(v.name)}${v.notes ? `<div style="font-size:12px;color:var(--muted);margin-top:2px">${escH(v.notes)}</div>` : ''}</div>`).join('')}`
      : '';
    const notesHtml = data.notes
      ? `<div class="notes-label" style="margin-top:14px">Notes</div><p style="font-size:13px;color:var(--text);line-height:1.5;margin:0">${escH(data.notes)}</p>`
      : '';
    const emptyHtml = !typesHtml && !variantsHtml && !notesHtml
      ? '<p style="font-size:13px;color:var(--muted);margin:14px 0 0">No notes added yet.</p>'
      : '';
    return `
      <div class="comp-card ${isOpen ? 'open' : ''}" id="cdc-${i.id}">
        <div class="comp-card-header" onclick="toggleCompDecCard('${i.id}')">
          <span class="status-label sl-done">Ready</span>
          <span class="comp-card-name">${escH(i.name)}</span>
          <span style="font-family:var(--mono);font-size:10px;color:var(--faint);margin-left:auto">${escH(i.cat)}</span>
          <span class="comp-chevron">▶</span>
        </div>
        <div class="comp-card-body ${isOpen ? '' : 'hidden'}">
          ${typesHtml}${variantsHtml}${notesHtml}${emptyHtml}
        </div>
      </div>`;
  };

  const compSection = compTotal === 0
    ? '<div class="empty" style="padding:16px 0;text-align:left">No components marked ready yet. Mark items as ready in the Components tab.</div>'
    : ['Organisms','Molecules','Atoms'].map((label, li) => {
        const items = [orgDone, molDone, atmDone][li];
        if (!items.length) return '';
        return `<div class="section-divider" style="display:flex;align-items:center;justify-content:space-between"><span>${label} — ${items.length}</span><span class="comp-summary-link" onclick="switchTabByName('components')">Go to Components →</span></div>
          ${mode === 'grid'
            ? `<div class="comp-grid-wrap">${items.map(i => compTile(i, tiers[li])).join('')}</div>`
            : items.map(i => compRow(i, tiers[li])).join('')}`;
      }).join('');

  // Audit decisions
  const s = stats();
  const decLabels = { keep: 'Keep / Evolve', cut: 'Cut', defer: 'Deferred' };
  const keeps  = ITEMS.filter(i => state[i.id]?.decision === 'keep');
  const cuts   = ITEMS.filter(i => state[i.id]?.decision === 'cut');
  const defers = ITEMS.filter(i => state[i.id]?.decision === 'defer');
  const allDecided = [...keeps, ...cuts, ...defers];

  const auditTileD = i => {
    const d = state[i.id].decision;
    return `<div class="comp-grid-tile" onclick="openAuditModal(${i.id})">
      <span class="status-label sl-${d}">${decLabels[d]}</span>
      <div class="comp-grid-name">${escH(i.title)}</div>
      <div class="comp-grid-desc">${escH(i.desc)}</div>
      <div class="comp-grid-cat">Item #${i.id}</div>
    </div>`;
  };
  const auditRowD = i => {
    const d         = state[i.id]?.decision || 'undecided';
    const notes     = state[i.id]?.notes || '';
    const open      = openDecisionCards.has(i.id);
    const isEditing = editingCards.has(i.id);
    const ro        = d !== 'undecided' && !isEditing;
    const comments  = i.comments.map(c => `
      <div class="comment">
        <div class="comment-who">${c.who}</div>
        <div class="comment-text">"${escH(c.text)}"</div>
      </div>`).join('');
    const refHtml = `
      ${i.node ? `<div style="margin:10px 0 6px"><span class="node-tag">node ${i.node}</span></div>` : ''}
      ${i.screenshot ? `
        <div class="card-screenshot" onclick="this.classList.toggle('expanded')" style="margin-bottom:12px">
          <img src="${i.screenshot}" alt="${escH(i.title)}" loading="lazy">
          <div class="screenshot-label">Figma screenshot — click to expand</div>
        </div>` : ''}
      ${i.hint ? `<div class="hint-box" style="margin-bottom:10px">💡 ${escH(i.hint)}</div>` : ''}
      <div class="comments-list">${comments}</div>`;
    const bodyHtml = ro
      ? `${refHtml}
         ${notes ? `<div class="notes-label">Notes</div><p class="ro-text">${escH(notes)}</p>` : '<span class="ro-empty" style="display:block;margin-top:10px">No notes added.</span>'}
         <div class="comp-card-actions" style="margin-top:14px">
           <button class="comp-mark-btn" onclick="toggleEditMode(${i.id})">Edit</button>
         </div>`
      : `${refHtml}
         <div class="notes-label">Notes</div>
         <textarea class="notes-input" placeholder="Add context, conditions, or what to keep/remove..."
           oninput="setNotes(${i.id}, this.value)">${escH(notes)}</textarea>
         <div class="dec-row" style="margin-top:12px">
           <button class="dec-btn ${d==='keep'?'sel-keep':''}" onclick="decide(${i.id},'keep')">✓ Keep / Evolve</button>
           <button class="dec-btn ${d==='cut'?'sel-cut':''}" onclick="decide(${i.id},'cut')">✕ Cut</button>
           <button class="dec-btn ${d==='defer'?'sel-defer':''}" onclick="decide(${i.id},'defer')">→ Deferred</button>
         </div>
         ${isEditing ? `<div class="comp-card-actions" style="margin-top:10px"><button class="comp-mark-btn" onclick="toggleEditMode(${i.id})">Done editing</button></div>` : ''}`;
    return `
      <div class="comp-card ${open ? 'open' : ''}" id="dc-${i.id}">
        <div class="comp-card-header" onclick="toggleDecisionCard(${i.id})">
          <span class="status-label sl-${d}">${decLabels[d] || 'Not Started'}</span>
          <span class="comp-card-name">${escH(i.title)}</span>
          <span class="comp-chevron">▶</span>
        </div>
        <div class="comp-card-body ${open ? '' : 'hidden'}">${bodyHtml}</div>
      </div>`;
  };

  const auditSection = s.total === 0
    ? '<div class="empty" style="padding:16px 0;text-align:left">No audit decisions made yet. Make Keep / Cut / Deferred decisions in Audit Feedback.</div>'
    : mode === 'grid'
      ? `<div class="comp-grid-wrap">${allDecided.map(auditTileD).join('')}</div>`
      : allDecided.map(auditRowD).join('');

  // Resolved blockers
  const resolvedBlockers = BLOCKERS.map((q, i) => ({ q, i, b: blockerState[i] })).filter(x => x.b.resolved);
  const resolvedBlockerSection = resolvedBlockers.length === 0
    ? '<div class="empty" style="padding:16px 0;text-align:left">No blockers resolved yet. Resolve decisions in the Blockers tab.</div>'
    : resolvedBlockers.map(({ q, i, b }) => {
        const isOpen    = openDecisionCards.has('blk-dec-' + i);
        const isEditing = editingCards.has('blk-' + i);
        const ro        = !isEditing;
        const bodyHtml  = ro
          ? `${b.answer ? `<div class="notes-label">Decision / Answer</div><p class="ro-text">${escH(b.answer)}</p>` : '<span class="ro-empty" style="display:block;margin-top:10px">No answer recorded.</span>'}
             <div class="comp-card-actions" style="margin-top:14px">
               <button class="comp-mark-btn" onclick="toggleBlockerEditModeDecisions(${i})">Edit</button>
             </div>`
          : `<div class="notes-label">Decision / Answer</div>
             <textarea class="notes-input" placeholder="Write your decision here…"
               oninput="updateBlockerAnswer(${i}, this.value)">${escH(b.answer)}</textarea>
             <div class="comp-card-actions" style="margin-top:10px">
               <button class="comp-mark-btn" onclick="toggleBlockerEditModeDecisions(${i})">Done editing</button>
             </div>`;
        return `
          <div class="comp-card ${isOpen ? 'open' : ''}" id="blk-dec-${i}">
            <div class="comp-card-header" onclick="toggleBlockerDecCard(${i})">
              <span class="status-label sl-done">Resolved</span>
              <div style="flex:1;min-width:0">
                <div class="card-title">${escH(bTitle(q))}</div>
                ${bDesc(q) ? `<div class="card-desc">${escH(bDesc(q))}</div>` : ''}
              </div>
              <span class="comp-chevron">▶</span>
            </div>
            <div class="comp-card-body ${isOpen ? '' : 'hidden'}">${bodyHtml}</div>
          </div>`;
      }).join('');

  const decFilterBar = `<div class="filter-bar" style="margin-bottom:0">
    <button class="filter-btn ${decisionsFilter==='all'?'active':''}" onclick="setDecisionsFilter('all')">All</button>
    <button class="filter-btn ${decisionsFilter==='components'?'active':''}" onclick="setDecisionsFilter('components')">Components (${compTotal})</button>
    <button class="filter-btn ${decisionsFilter==='audit'?'active':''}" onclick="setDecisionsFilter('audit')">Audit Decisions (${s.total})</button>
    <button class="filter-btn ${decisionsFilter==='blockers'?'active':''}" onclick="setDecisionsFilter('blockers')">Resolved Blockers (${resolvedBlockers.length})</button>
  </div>`;

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px">
      ${decFilterBar}
      ${toggle}
    </div>
    ${(decisionsFilter === 'all' || decisionsFilter === 'components') ? `
      <div class="section-label" style="margin-bottom:10px">
        Components Ready — ${compTotal} of ${grandTotal}
        <span class="comp-summary-link" style="margin-left:12px" onclick="switchTabByName('components')">Go to Components →</span>
      </div>
      ${compSection}` : ''}
    ${decisionsFilter === 'all' && compTotal > 0 && s.total > 0 ? `
      <div style="border-top:2px solid var(--border);margin:36px 0 28px"></div>` : ''}
    ${(decisionsFilter === 'all' || decisionsFilter === 'audit') ? `
      <div class="section-label" style="margin-bottom:10px">Audit Decisions — ${s.total} of 22</div>
      ${auditSection}` : ''}
    ${decisionsFilter === 'all' && (s.total > 0 || resolvedBlockers.length > 0) ? `
      <div style="border-top:2px solid var(--border);margin:36px 0 28px"></div>` : ''}
    ${(decisionsFilter === 'all' || decisionsFilter === 'blockers') ? `
      <div class="section-label" style="margin-bottom:10px">Resolved Blockers — ${resolvedBlockers.length} of ${BLOCKERS.length}
        <span class="comp-summary-link" style="margin-left:12px" onclick="switchTabByName('blockers')">Go to Blockers →</span>
      </div>
      ${resolvedBlockerSection}` : ''}
  `;
}

// ─────────────────────────────────────────────
// DEFERRED COMP CARD — for Blockers tab
// ─────────────────────────────────────────────
function renderDeferredCompCard(type, id, name, cat, label) {
  let data = { notes: '', status: 'deferred', variants: null };
  if (type === 'org') { data = getOrgData(id); }
  else if (type === 'mol') { data = getMolData(id); }
  else if (type === 'atom') { data = getAtomData(id); }
  else {
    // custom items
    const tier = type === 'custom-org' ? 'organisms' : type === 'custom-mol' ? 'molecules' : 'atoms';
    const c = (compState.custom?.[tier] || []).find(x => x.id === id);
    if (c) data = c;
  }

  const variantsHtml = data.variants ? data.variants.map((v, i) => `
    <div class="variant-item">
      <div class="variant-name-row">
        <span class="variant-num">${i + 1}</span>
        <input class="variant-name-input" type="text" value="${escH(v.name)}" placeholder="Variant name" oninput="updateVariantName('${id}', ${i}, this.value)">
      </div>
      <textarea class="notes-input" style="min-height:48px" placeholder="Notes for this variant…" oninput="updateVariantNotes('${id}', ${i}, this.value)">${escH(v.notes)}</textarea>
    </div>`).join('') : '';

  const isOpen = openDeferredCards.has(id);
  return `
    <div class="comp-card ${isOpen ? 'open' : ''}" style="margin-bottom:12px" id="deferred-${id}">
      <div class="comp-card-header" onclick="toggleDeferredCard('${id}')">
        <span class="status-label sl-deferred">Deferred</span>
        <span class="comp-card-name">${escH(name)}</span>
        <span style="font-family:var(--mono);font-size:10px;color:var(--faint);margin-left:auto">${escH(label)} · ${escH(cat)}</span>
        <span class="comp-chevron">▶</span>
      </div>
      <div class="comp-card-body ${isOpen ? '' : 'hidden'}">
        <div class="notes-label" style="margin-top:14px">Notes</div>
        <textarea class="notes-input" placeholder="Add feedback or notes before restoring…" oninput="updateOrgNotes('${id}', this.value)">${escH(data.notes || '')}</textarea>
        ${variantsHtml ? `<div class="variants-header"><div class="notes-label" style="margin:0">Variants</div></div>${variantsHtml}` : ''}
        <div class="comp-card-actions">
          <button class="comp-mark-btn" onclick="setCompStatus('${type}','${id}','done');renderBlockers()">Mark as ready</button>
          <button class="comp-unmark-btn" onclick="setCompStatus('${type}','${id}','todo');renderBlockers()">Restore to active</button>
        </div>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────
// MODAL — grid tile popups
// ─────────────────────────────────────────────
function openGridModal(tier, id) {
  const modal = document.getElementById('comp-modal');
  const content = document.getElementById('comp-modal-content');
  if (!modal || !content) return;

  let data, name, cat, types = null;
  if (tier === 'org') { data = getOrgData(id); name = data.name; cat = data.cat; }
  else if (tier === 'mol') { data = getMolData(id); name = data.name; cat = data.cat; types = data.types; }
  else if (tier === 'atom') { data = getAtomData(id); name = data.name; cat = data.cat; }
  else { // custom
    const tierKey = tier === 'custom-org' ? 'organisms' : tier === 'custom-mol' ? 'molecules' : 'atoms';
    data = (compState.custom?.[tierKey] || []).find(x => x.id === id) || { notes: '', status: 'todo', variants: null };
    name = data.name || 'Custom item'; cat = data.cat || '';
  }

  const variantsHtml = data.variants ? `
    <div class="variants-header">
      <div class="notes-label" style="margin:0">Variants (${data.variants.length})</div>
      <div class="variant-controls">
        <button class="variant-btn" onclick="addVariant('${id}');refreshModal('${tier}','${id}')">+</button>
        <button class="variant-btn" onclick="removeVariant('${id}');refreshModal('${tier}','${id}')">−</button>
      </div>
    </div>
    ${data.variants.map((v, i) => `
      <div class="variant-item">
        <div class="variant-name-row">
          <span class="variant-num">${i + 1}</span>
          <input class="variant-name-input" type="text" value="${escH(v.name)}" oninput="updateVariantName('${id}', ${i}, this.value)">
        </div>
        <textarea class="notes-input" style="min-height:48px" placeholder="Notes for this variant…" oninput="updateVariantNotes('${id}', ${i}, this.value)">${escH(v.notes)}</textarea>
      </div>`).join('')}` : '';

  const typesHtml = types ? `<div class="notes-label" style="margin-top:12px">Types / States</div><div class="type-chips">${types.map(t => `<span class="type-chip">${escH(t)}</span>`).join('')}</div>` : '';

  const isEditing = editingCards.has(id);
  const ro = (data.status === 'done' || data.status === 'deferred') && !isEditing;

  let modalBody;
  if (ro) {
    const notesRo = data.notes
      ? `<div class="notes-label" style="margin-top:${typesHtml ? '4px' : '14px'}">Notes</div><p class="ro-text">${escH(data.notes)}</p>`
      : `<span class="ro-empty">No notes added yet.</span>`;
    const variantsRo = data.variants
      ? `<div class="notes-label" style="margin-top:12px">Variants (${data.variants.length})</div>${data.variants.map((v,vi) => `<div class="ro-variant"><span class="variant-num">${vi+1}</span><div class="ro-variant-wrap"><strong>${escH(v.name||'Unnamed')}</strong>${v.notes?`<div class="ro-variant-notes">${escH(v.notes)}</div>`:''}</div></div>`).join('')}`
      : '';
    modalBody = `${typesHtml}${notesRo}${variantsRo}
      <div class="comp-card-actions" style="margin-top:16px">
        <button class="comp-unmark-btn" onclick="setCompStatus('${tier}','${id}','todo');_closeModal()">${data.status === 'deferred' ? 'Restore' : 'Unmark'}</button>
        <button class="comp-mark-btn" onclick="toggleEditModeModal('${tier}','${id}')">Edit</button>
      </div>`;
  } else {
    modalBody = `${typesHtml}
      <div class="notes-label" style="margin-top:${typesHtml ? '0' : '4px'}">Notes</div>
      <textarea class="notes-input" style="min-height:80px" placeholder="Describe this component…" oninput="updateModalNotes('${tier}','${id}',this.value)">${escH(data.notes || '')}</textarea>
      ${variantsHtml}
      <div class="comp-card-actions" style="margin-top:16px">
        ${actionsHtml(tier, id, data.status, tier.startsWith('custom'))}
      </div>`;
  }

  content.innerHTML = `
    <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:20px">
      <div style="flex:1">
        <div style="font-size:17px;font-weight:700;color:var(--text);line-height:1.3">${escH(name)}</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:4px">${escH(cat)}</div>
      </div>
      <span class="status-label sl-${data.status}">${statusLabel(data.status)}</span>
    </div>
    ${modalBody}`;

  modal.style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function refreshModal(tier, id) {
  openGridModal(tier, id);
}

function updateModalNotes(tier, id, value) {
  if (tier === 'org')        updateOrgNotes(id, value);
  else if (tier === 'mol')   updateMolNotes(id, value);
  else if (tier === 'atom')  updateAtomNotes(id, value);
  else                       updateCustomNotes(tier === 'custom-org' ? 'organisms' : tier === 'custom-mol' ? 'molecules' : 'atoms', id, value);
  // Update status dot in modal
  const data = tier === 'org' ? getOrgData(id) : tier === 'mol' ? getMolData(id) : tier === 'atom' ? getAtomData(id) : null;
}

function closeModal(e) {
  // Allow close from backdrop click or direct call (no event) or × button
  if (e && e.target !== document.getElementById('comp-modal')) return;
  _closeModal();
}

function _closeModal() {
  document.getElementById('comp-modal').style.display = 'none';
  document.body.style.overflow = '';
  const y = window.scrollY;
  if (activeTab === 'components')  { renderCompTab(); updateCompProgress(); }
  else if (activeTab === 'audit')      renderCards();
  else if (activeTab === 'blockers')   renderBlockers();
  else if (activeTab === 'decisions')  renderDecisionsSummary();
  window.scrollTo(0, y);
}

function renderCompSummary() {
  const el = document.getElementById('comp-summary-section');
  if (!el) return;

  if (typeof ORGANISMS_DATA === 'undefined') { el.innerHTML = ''; return; }

  const orgDone  = ORGANISMS_DATA.filter(o => compState.organisms?.[o.id]?.status === 'done');
  const molDone  = MOLECULES_DATA.filter(m => compState.molecules?.[m.id]?.status === 'done');
  const atmDone  = ATOMS_DATA.filter(a => compState.atoms?.[a.id]?.status === 'done');
  const total    = orgDone.length + molDone.length + atmDone.length;
  const grandTotal = ORGANISMS_DATA.length + MOLECULES_DATA.length + ATOMS_DATA.length;

  if (total === 0) {
    el.innerHTML = `
      <div class="section-label" style="margin-bottom:6px">
        Components Ready
        <span class="comp-summary-link" onclick="switchTabByName('components')">Go to Components →</span>
      </div>
      <div class="empty" style="padding:16px 0;text-align:left">No components marked ready yet. Go to the Components tab to annotate and mark items ready.</div>`;
    return;
  }

  const makeRows = (items, label) => items.length === 0 ? '' : `
    <div class="section-divider">${label} — ${items.length} ready</div>
    ${items.map(i => `
      <div class="comp-summary-row">
        <span class="status-dot status-done"></span>
        <span>${escH(i.name)}</span>
        <span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--faint)">${escH(i.cat)}</span>
      </div>`).join('')}`;

  el.innerHTML = `
    <div class="section-label" style="margin-bottom:10px">
      Components Ready — ${total} of ${grandTotal}
      <span class="comp-summary-link" onclick="switchTabByName('components')">Go to Components →</span>
    </div>
    ${makeRows(orgDone, 'Organisms')}
    ${makeRows(molDone, 'Molecules')}
    ${makeRows(atmDone, 'Atoms')}`;
}

// ─────────────────────────────────────────────
// COMPONENTS — State
// ─────────────────────────────────────────────
const COMP_KEY = 'vast-components-v1';
const COMP_OPEN_KEY = 'vast-comp-open';

function loadComp() {
  try { return JSON.parse(localStorage.getItem(COMP_KEY) || '{}'); } catch { return {}; }
}
let compState = loadComp();
function saveComp() { localStorage.setItem(COMP_KEY, JSON.stringify(compState)); }

let activeCompTab = 'organisms';
let compListMode = 'list';
let openCompCards = new Set(JSON.parse(localStorage.getItem(COMP_OPEN_KEY) || '[]'));
function saveOpen() { localStorage.setItem(COMP_OPEN_KEY, JSON.stringify([...openCompCards])); }
if (!compState.custom) compState.custom = { organisms: [], molecules: [], atoms: [] };

function getOrgData(id) {
  const def = ORGANISMS_DATA.find(o => o.id === id);
  const saved = compState.organisms?.[id] || {};
  return { ...def, notes: saved.notes || '', status: saved.status || 'todo', variants: saved.variants || def.variants.map(v => ({...v})) };
}
function getMolData(id) {
  const def = MOLECULES_DATA.find(m => m.id === id);
  const saved = compState.molecules?.[id] || {};
  return { ...def, notes: saved.notes || '', status: saved.status || 'todo' };
}
function getAtomData(id) {
  const def = ATOMS_DATA.find(a => a.id === id);
  const saved = compState.atoms?.[id] || {};
  return { ...def, notes: saved.notes || '', status: saved.status || 'todo' };
}

function ensureOrg(id) {
  if (!compState.organisms) compState.organisms = {};
  if (!compState.organisms[id]) {
    const def = ORGANISMS_DATA.find(o => o.id === id);
    compState.organisms[id] = { notes: '', status: 'todo', variants: def.variants.map(v => ({...v})) };
  }
  return compState.organisms[id];
}
function ensureMol(id) {
  if (!compState.molecules) compState.molecules = {};
  if (!compState.molecules[id]) compState.molecules[id] = { notes: '', status: 'todo' };
  return compState.molecules[id];
}
function ensureAtom(id) {
  if (!compState.atoms) compState.atoms = {};
  if (!compState.atoms[id]) compState.atoms[id] = { notes: '', status: 'todo' };
  return compState.atoms[id];
}

// ─────────────────────────────────────────────
// COMPONENTS — Progress
// ─────────────────────────────────────────────
function compStats() {
  const orgDone = ORGANISMS_DATA.filter(o => compState.organisms?.[o.id]?.status === 'done').length;
  const molDone = MOLECULES_DATA.filter(m => compState.molecules?.[m.id]?.status === 'done').length;
  const atmDone = ATOMS_DATA.filter(a => compState.atoms?.[a.id]?.status === 'done').length;
  const total = ORGANISMS_DATA.length + MOLECULES_DATA.length + ATOMS_DATA.length;
  return { done: orgDone + molDone + atmDone, total };
}

function updateCompProgress() {
  const { done, total } = compStats();
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const label = document.getElementById('comp-prog-label');
  const fill  = document.getElementById('comp-prog-fill');
  const pctEl = document.getElementById('comp-prog-pct');
  if (label) label.textContent = done + ' of ' + total + ' ready';
  if (fill)  fill.style.width  = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
}

// ─────────────────────────────────────────────
// COMPONENTS — Helpers
// ─────────────────────────────────────────────
function escH(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function groupByKey(arr, key) {
  return arr.reduce((acc, item) => { const k = item[key]; if (!acc[k]) acc[k] = []; acc[k].push(item); return acc; }, {});
}
function statusLabel(s) {
  if (s === 'done')     return 'Ready';
  if (s === 'progress') return 'In progress';
  if (s === 'deferred') return 'Deferred';
  return 'Not started';
}

// Push deferred items to the bottom of a section without removing them
function sortDeferred(arr, getStatus) {
  const fn = getStatus || (x => x.status || 'todo');
  return [...arr.filter(x => fn(x) !== 'deferred'), ...arr.filter(x => fn(x) === 'deferred')];
}

// COMPONENTS — Render

function switchCompTab(tab, btn) {
  activeCompTab = tab;
  document.querySelectorAll('.comp-subtab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.comp-view').forEach(v => v.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('cv-' + tab).classList.add('active');
  renderCompTab();
}

function renderCompTab() {
  if (activeCompTab === 'organisms')  renderOrganisms();
  else if (activeCompTab === 'molecules') renderMolecules();
  else renderAtoms();
  updateCompProgress();
}

// ── Shared card-action buttons ──
function actionsHtml(type, id, status, isCustom) {
  const ready      = `<button class="comp-mark-btn" onclick="setCompStatus('${type}','${id}','done')">Mark as ready</button>`;
  const unmark     = `<button class="comp-unmark-btn" onclick="setCompStatus('${type}','${id}','todo')">Unmark</button>`;
  const doneEditing= `<button class="comp-mark-btn" onclick="toggleEditMode('${id}')">Done editing</button>`;
  const defer      = `<button class="comp-unmark-btn" onclick="setCompStatus('${type}','${id}','deferred')" style="color:var(--muted)">Deferred</button>`;
  const restore    = `<button class="comp-unmark-btn" onclick="setCompStatus('${type}','${id}','todo')">Restore</button>`;
  const del        = isCustom ? `<button class="delete-item-btn" onclick="deleteCustomItem('${type}','${id}')">✕ Delete</button>` : '';
  if (status === 'done')     return `${del}${unmark}${doneEditing}`;
  if (status === 'deferred') return `${del}${restore}${doneEditing}`;
  return `${del}${defer}${ready}`;
}

function gridTile(id, name, cat, status, isCustom, tier) {
  return `
    <div class="comp-grid-tile ${isCustom ? 'custom-item' : ''} ${status === 'deferred' ? 'deferred' : ''}"
         onclick="openGridModal('${tier}','${id}')">
      <span class="status-label sl-${status}">${statusLabel(status)}</span>
      <div class="comp-grid-name">${escH(name)}</div>
      <div class="comp-grid-cat">${escH(cat)}</div>
    </div>`;
}

function switchToListAndOpen(id) {
  setCompView('list');
  // open the card
  if (!openCompCards.has(id)) { openCompCards.add(id); saveOpen(); }
  renderCompTab();
  setTimeout(() => {
    const el = document.getElementById('cc-' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 60);
}

function renderOrganisms() {
  const el = document.getElementById('cv-organisms');
  if (!el) return;
  const groups = groupByKey(ORGANISMS_DATA, 'cat');
  let html = '';

  if (compListMode === 'grid') {
    Object.entries(groups).forEach(([cat, items]) => {
      const custom = (compState.custom?.organisms || []).filter(c => c.cat === cat);
      html += `<div class="section-divider" style="display:flex;align-items:center;justify-content:space-between"><span>${escH(cat)}</span><button class="add-item-btn" style="width:auto;padding:3px 10px;font-size:10px" onclick="addCustomItem('organisms','${escH(cat)}')">+ Add</button></div><div class="comp-grid-wrap">`;
      sortDeferred(items, def => compState.organisms?.[def.id]?.status || 'todo').forEach(def => {
        const s = compState.organisms?.[def.id]?.status || 'todo';
        html += gridTile(def.id, def.name, cat, s, false, 'org');
      });
      sortDeferred(custom).forEach(c => html += gridTile(c.id, c.name, cat, c.status, true, 'custom-org'));
      html += `</div>`;
    });
  } else {
    Object.entries(groups).forEach(([cat, items]) => {
      const custom = (compState.custom?.organisms || []).filter(c => c.cat === cat);
      const allItems = sortDeferred(items, def => compState.organisms?.[def.id]?.status || 'todo');
      const done = items.filter(i => compState.organisms?.[i.id]?.status === 'done').length
                 + custom.filter(c => c.status === 'done').length;
      const total = items.length + custom.length;
      html += `<div class="section-divider" style="display:flex;align-items:center;justify-content:space-between">
        <span>${escH(cat)} — ${done}/${total}</span>
        <button class="add-item-btn" style="width:auto;padding:3px 10px;font-size:10px" onclick="addCustomItem('organisms','${escH(cat)}')">+ Add</button>
      </div>`;
      allItems.forEach(def => {   // already sorted: deferred pushed to bottom
        const d = getOrgData(def.id);
        const isOpen = openCompCards.has(def.id);
        const isEditing = editingCards.has(def.id);
        const ro = (d.status === 'done' || d.status === 'deferred') && !isEditing;
        const bodyHtml = ro
          ? `${d.notes ? `<div class="notes-label" style="margin-top:14px">Notes</div><p class="ro-text">${escH(d.notes)}</p>` : '<span class="ro-empty">No notes added yet.</span>'}
             ${d.variants.length ? `<div class="notes-label" style="margin-top:12px">Variants (${d.variants.length})</div>${d.variants.map((v,vi) => `<div class="ro-variant"><span class="variant-num">${vi+1}</span><div class="ro-variant-wrap"><strong>${escH(v.name||'Unnamed')}</strong>${v.notes?`<div class="ro-variant-notes">${escH(v.notes)}</div>`:''}</div></div>`).join('')}` : ''}
             <div class="comp-card-actions"><button class="comp-unmark-btn" onclick="setCompStatus('org','${def.id}','todo')">${d.status === 'deferred' ? 'Restore' : 'Unmark'}</button><button class="comp-mark-btn" onclick="toggleEditMode('${def.id}')">Edit</button></div>`
          : `<div class="notes-label" style="margin-top:14px">Component Notes</div>
             <textarea class="notes-input" placeholder="Describe this component — purpose, rules, visual behavior, Vast-specific constraints…" oninput="updateOrgNotes('${def.id}', this.value)">${escH(d.notes)}</textarea>
             <div class="variants-header"><div class="notes-label" style="margin:0">Variants (${d.variants.length})</div><div class="variant-controls"><button class="variant-btn" onclick="addVariant('${def.id}')">+</button><button class="variant-btn" onclick="removeVariant('${def.id}')">−</button></div></div>
             ${d.variants.map((v, i) => `<div class="variant-item"><div class="variant-name-row"><span class="variant-num">${i + 1}</span><input class="variant-name-input" type="text" value="${escH(v.name)}" placeholder="Variant name" oninput="updateVariantName('${def.id}', ${i}, this.value)"></div><textarea class="notes-input" style="min-height:52px" placeholder="Notes for this variant…" oninput="updateVariantNotes('${def.id}', ${i}, this.value)">${escH(v.notes)}</textarea></div>`).join('')}

}

// ─────────────────────────────────────────────
// COMPONENTS — Actions
// ─────────────────────────────────────────────
function toggleCompCard(id) {
  if (openCompCards.has(id)) openCompCards.delete(id);
  else openCompCards.add(id);
  saveOpen();
  const card = document.getElementById('cc-' + id);
  const body = document.getElementById('ccb-' + id) || card?.querySelector('.comp-card-body');
  if (card) card.classList.toggle('open', openCompCards.has(id));
  if (body) body.classList.toggle('hidden', !openCompCards.has(id));
  if (!document.getElementById('ccb-' + id) && card) {
    const b = card.querySelector('.comp-card-body');
    if (b) b.classList.toggle('hidden', !openCompCards.has(id));
  }
}

function updateOrgNotes(id, value) {
  const org = ensureOrg(id);
  org.notes = value;
  if (org.status === 'todo' && value.trim()) { org.status = 'progress'; updateStatusUI(id, 'progress'); }
  saveComp();
}
function updateMolNotes(id, value) {
  const mol = ensureMol(id);
  mol.notes = value;
  if (mol.status === 'todo' && value.trim()) { mol.status = 'progress'; updateStatusUI(id, 'progress'); }
  saveComp();
}
function updateAtomNotes(id, value) {
  const atom = ensureAtom(id);
  atom.notes = value;
  if (atom.status === 'todo' && value.trim()) { atom.status = 'progress'; updateStatusUI(id, 'progress'); }
  saveComp();
}
function updateVariantName(id, index, value) {
  const org = ensureOrg(id);
  if (org.variants[index]) { org.variants[index].name = value; saveComp(); }
}
function updateVariantNotes(id, index, value) {
  const org = ensureOrg(id);
  if (org.variants[index]) {
    org.variants[index].notes = value;
    if (org.status === 'todo' && value.trim()) { org.status = 'progress'; updateStatusUI(id, 'progress'); }
    saveComp();
  }
}
function addVariant(id) {
  const org = ensureOrg(id);
  org.variants.push({ name: 'New variant', notes: '' });
  saveComp();
  const y = window.scrollY;
  renderOrganisms();
  updateCompProgress();
  window.scrollTo(0, y);
}
function removeVariant(id) {
  const org = ensureOrg(id);
  if (org.variants.length > 1) { org.variants.pop(); saveComp(); }
  const y = window.scrollY;
  renderOrganisms();
  updateCompProgress();
  window.scrollTo(0, y);
}
function setCompStatus(type, id, status) {
  if (type === 'org')        ensureOrg(id).status  = status;
  else if (type === 'mol')   ensureMol(id).status  = status;
  else if (type === 'atom')  ensureAtom(id).status = status;
  else if (type === 'custom-org') {
    const c = (compState.custom.organisms || []).find(x => x.id === id);
    if (c) c.status = status;
  } else if (type === 'custom-mol') {
    const c = (compState.custom.molecules || []).find(x => x.id === id);
    if (c) c.status = status;
  } else if (type === 'custom-atom') {
    const c = (compState.custom.atoms || []).find(x => x.id === id);
    if (c) c.status = status;
  }
  saveComp();
  updateStatusUI(id, status);
  updateCompProgress();
  const y = window.scrollY;
  renderCompTab();
  window.scrollTo(0, y);
}

function updateStatusUI(id, status) {
  const sl = document.getElementById('sl-' + id);
  if (sl) { sl.className = 'status-label sl-' + status; sl.textContent = statusLabel(status); }
}

// ── View toggle ──
function setCompView(mode) {
  compListMode = mode;
  document.getElementById('cv-list-btn')?.classList.toggle('active', mode === 'list');
  document.getElementById('cv-grid-btn')?.classList.toggle('active', mode === 'grid');
  const y = window.scrollY;
  renderCompTab();
  window.scrollTo(0, y);
}

// ── Custom items ──
function addCustomItem(tier, cat) {
  if (!compState.custom) compState.custom = { organisms: [], molecules: [], atoms: [] };
  const newItem = { id: 'custom-' + Date.now(), name: 'New component', cat, notes: '', status: 'todo' };
  compState.custom[tier].push(newItem);
  saveComp();
  const y = window.scrollY;
  renderCompTab();
  updateCompProgress();
  window.scrollTo(0, y);
}

function deleteCustomItem(tier, id) {
  const tierKey = tier.replace('custom-','').replace('org','organisms').replace('mol','molecules').replace('atom','atoms');
  const fullTier = tierKey === 'organisms' || tierKey === 'molecules' || tierKey === 'atoms' ? tierKey
    : tier === 'custom-org' ? 'organisms' : tier === 'custom-mol' ? 'molecules' : 'atoms';
  if (!compState.custom) return;
  compState.custom[fullTier] = (compState.custom[fullTier] || []).filter(c => c.id !== id);
  saveComp();
  const y = window.scrollY;
  renderCompTab();
  updateCompProgress();
  window.scrollTo(0, y);
}

function updateCustomName(tier, id, value) {
  const c = (compState.custom?.[tier] || []).find(x => x.id === id);
  if (c) { c.name = value; saveComp(); }
}

function updateCustomNotes(tier, id, value) {
  const c = (compState.custom?.[tier] || []).find(x => x.id === id);
  if (c) { c.notes = value; if (c.status === 'todo' && value.trim()) c.status = 'progress'; saveComp(); }
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
renderNewDashboard();
refresh();
</script>
